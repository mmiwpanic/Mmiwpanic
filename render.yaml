services:
  - type: web
    name: mmiw-panic
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn mmiw_site.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PANIC_REDIRECT
        value: https://www.weather.com
      - key: PANIC_RATE_LIMIT
        value: "5"
      - key: PANIC_RATE_WINDOW_SEC
        value: "300"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MMIW_VAULT_KEY
        sync: false
      - key: MMIW_DB_PATH
        value: /opt/render/project/src/mmiw.db
      - key: MMIW_UPLOAD_DIR
        value: /opt/render/project/src/uploads

